<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="veiwport" content="width=device-width,initial-scale=1.0">
        <title> Welcome to my portfolio </title>
       
    </head>
    <body>
        <h1>Contact</h1>
        <p>have a project? feel free to contact me!</p>
        <form>
            <label for="name">Name:</label>
            <input type="text" placeholder="Enter your name" id="name" name="name" required><br><br> 
            <label for="email">Email:</label>
            <input type="email" placeholder="Enter your email" id="email" name="email" required><br><br>
            
            <label for="subject">Subject:</label>
            <select name="subject" id="subject">
                <option value="hire">i want to be hired</option>
                <option value="collaboration">i want to collaborate</option>
                <option value="other">Other</option>
            </select><br><br>

            <label for="message">Message:</label>
            <textarea name="message" id="message" cols="30" rows="10" placeholder="Enter your message"></textarea><br><br>

            <button type="submit" value="Submit">
                Send message
            </button>

        </form>
    </body>
