<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form</title>
    </head>
    <body>
        <form action="">
            <!-- form -->
            <label for="">Name :</label>
            <input type="text" placeholder="Enter your name" name="fullname" id="fullname" required><br><br>

            <label for="">Email :</label>
            <input type="email" placeholder="Enter your email" name="email" id="email" required><br><br>

            <label for="">Phone :</label>
            <input type="tel" placeholder="Enter your phone number" name="phone" id ="phone" required><br><br>

            <label for="psw">Password :</label>
            <input type="password" placeholder="Enter your password" minlength="8" name="psw" id="psw" required><br><br>

            <!-- radio -->
             <p>Gender:</p>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="female" value="female">

            <!-- checkbox -->
            <p>Hobbies :</p>
            <input type="checkbox" name="hobbies" id="hobbies" value="cricket">Cricket<br><br>
            <input type="checkbox" name="hobbies" id="hobbies" value="football">Football<br><br>  
            <input type="checkbox" name="hobbies" id="hobbies" value="reading">Reading<br><br>

            <!-- dropdown -->
            <label for="country">Country :</label>  
            <select name="country" id="country">
                <option value="india">India</option>
                <option value="usa">USA</option>
                <option value="uk">UK</option>
            </select><br><br>

            <!-- textarea -->
            <label for="message">Message :</label><br>
            <textarea name="message" id="message" rows="4" cols="50" placeholder="Enter your message"></textarea><br><br>

            <!-- file upload -->
            <label for="file">Upload your file :</label>
            <input type="file" name="file" id="file"><br><br>

            <!-- dob -->
            <label for="dob">Date of Birth :</label>
            <input type="date" name="dob" id="dob"><br><br>

            <!-- button -->
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </form>
    </body>
</html>
